<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Riverbed - Interactive Countdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --bg: #0a0e14;
            --accent: #00ffd1;
            --secondary: #e8f4f8;
            --accent-glow: rgba(0, 255, 209, 0.4);
            --ui-bg: rgba(10, 14, 20, 0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: var(--secondary);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            touch-action: none;
            transition: background-color 1s ease;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Center Massive Number */
        #big-number {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(150px, 40vh, 400px);
            font-weight: 700;
            color: transparent;
            -webkit-text-stroke: 3px var(--accent);
            text-shadow: 0 0 40px var(--accent-glow);
            z-index: 2;
            opacity: 0.8;
            pointer-events: none;
            transition: opacity 0.5s ease, text-shadow 0.5s ease;
        }
        
        #big-number.pop {
            animation: popNumber 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes popNumber {
            0% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; text-shadow: 0 0 80px var(--accent); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; text-shadow: 0 0 20px var(--accent-glow); }
        }

        /* UI Layer */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .ui-panel { pointer-events: auto; }

        button {
            background: var(--ui-bg);
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 700;
            padding: 8px 16px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        button:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* Main Center Action */
        #center-action {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #btn-begin {
            font-size: 24px;
            padding: 15px 40px;
            border-width: 2px;
        }

        /* Bottom Controls (Compose State) */
        #bottom-bar {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
            margin-bottom: 20px;
        }

        #bottom-bar.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* Sequencer */
        #sequencer {
            display: flex;
            gap: 10px;
            max-width: 90vw;
            overflow-x: auto;
            padding: 10px;
        }

        .seq-slot {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            transition: all 0.2s;
            position: relative;
        }

        .seq-slot::after {
            content: attr(data-num);
            position: absolute;
            top: -20px;
            font-size: 10px;
            color: var(--secondary);
            opacity: 0.5;
        }

        .seq-slot:hover { border-color: var(--secondary); }
        .seq-slot.active { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        .seq-slot.filled { border-width: 2px; color: var(--accent); font-weight: bold; }
        .seq-slot.playing { background: var(--accent); color: var(--bg); transform: scale(1.1); }

        .controls-row { display: flex; gap: 10px; }
        
        #btn-export { display: none; border-color: #ffb700; color: #ffb700; }
        #btn-export:hover { background: #ffb700; color: var(--bg); box-shadow: 0 0 20px rgba(255, 183, 0, 0.4); }

        /* Customization Panel */
        #custom-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: var(--ui-bg);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            backdrop-filter: blur(8px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        #custom-panel.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .control-group { display: flex; flex-direction: column; gap: 5px; }
        .control-label { font-size: 10px; color: var(--secondary); opacity: 0.7; letter-spacing: 1px; }
        
        .toggle-group { display: flex; gap: 5px; }
        .toggle-btn {
            background: transparent; border: 1px solid rgba(255,255,255,0.2);
            color: var(--secondary); font-size: 10px; padding: 4px 8px; flex: 1;
        }
        .toggle-btn.active { border-color: var(--accent); color: var(--accent); }

        input[type=range] {
            -webkit-appearance: none; width: 100%; background: transparent; height: 12px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 12px; width: 12px; background: var(--accent); cursor: pointer;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 1px; cursor: pointer; background: rgba(255,255,255,0.3);
        }

        @media (max-width: 768px) {
            #big-number { top: 35%; }
            #custom-panel { bottom: auto; top: 60px; right: 10px; transform: scale(0.8); transform-origin: top right; }
            .seq-slot { width: 30px; height: 30px; }
        }
    </style>
</head>
<body>

    <canvas id="gl"></canvas>

    <div id="big-number">10</div>

    <div id="ui-layer">
        <div id="center-action" class="ui-panel">
            <button id="btn-begin">BEGIN</button>
        </div>

        <div id="custom-panel" class="ui-panel">
            <div class="control-group">
                <div class="control-label">MATERIAL</div>
                <div class="toggle-group" id="mat-toggles">
                    <button class="toggle-btn active" data-val="0">GRAN</button>
                    <button class="toggle-btn" data-val="1">BASA</button>
                    <button class="toggle-btn" data-val="2">QUAR</button>
                </div>
            </div>
            <div class="control-group">
                <div class="control-label">SHAPE</div>
                <input type="range" id="slider-shape" min="0" max="1" step="0.01" value="0.5">
            </div>
            <div class="control-group">
                <div class="control-label">SCENE</div>
                <div class="toggle-group" id="scene-toggles">
                    <button class="toggle-btn active" data-val="0">DAWN</button>
                    <button class="toggle-btn" data-val="1">DUSK</button>
                    <button class="toggle-btn" data-val="2">GLAC</button>
                </div>
            </div>
        </div>

        <div id="bottom-bar" class="ui-panel">
            <div id="sequencer"></div>
            <div class="controls-row">
                <button id="btn-play">PLAY</button>
                <button id="btn-record">RECORD</button>
                <button id="btn-reset">RESET</button>
                <button id="btn-export">EXPORT WAV</button>
            </div>
        </div>
    </div>

<script>
/**
 * RIVERBED - Interactive Stone-Synthesizer Countdown
 */

// --- STATE & CONFIG ---
const STATES = { IDLE: 0, AUTO: 1, COMPOSE: 2 };
let currentState = STATES.IDLE;

const THEMES = [
    { bg: '#0a0e14', accent: '#00ffd1', sec: '#e8f4f8' }, // DAWN
    { bg: '#0e0a14', accent: '#ff3df0', sec: '#f8e8f4' }, // DUSK
    { bg: '#0a1014', accent: '#c0f0ff', sec: '#ffffff' }  // GLACIER
];

const MATERIALS = [
    { name: 'GRANITE', filter: 4000, decays: [1.8, 0.8, 0.3, 0.15], amps: [1.0, 0.5, 0.25, 0.1], ratios: [1.00, 2.76, 5.40, 8.93] },
    { name: 'BASALT',  filter: 2500, decays: [1.0, 0.4, 0.15, 0.05], amps: [1.0, 0.4, 0.1, 0.05], ratios: [1.00, 2.76, 5.40, 8.93] },
    { name: 'QUARTZ',  filter: 7000, decays: [2.5, 1.2, 0.6, 0.3], amps: [1.0, 0.5, 0.3, 0.25], ratios: [1.00, 2.76, 5.40, 8.93] }
];

// D minor pentatonic: D2, F2, G2, A2, C3, D3, F3, G3, A3, C4
const STONE_FREQS = [73.42, 87.31, 98.00, 110.00, 130.81, 146.83, 174.61, 196.00, 220.00, 261.63];
const AUTO_SEQUENCE = [9, 7, 5, 6, 4, 3, 2, 1, 0, 5]; // 10 strikes for 10->1

let activeTheme = 0;
let activeMaterial = 0;
let shapeFactor = 0.5;

let sequence = new Array(10).fill(null);
let selectedSlot = 0;
let isPlayingSequence = false;
let isRecording = false;

// --- DOM ELEMENTS ---
const cvs = document.getElementById('gl');
const ctx = cvs.getContext('2d');
const numEl = document.getElementById('big-number');
const btnBegin = document.getElementById('btn-begin');
const bottomBar = document.getElementById('bottom-bar');
const customPanel = document.getElementById('custom-panel');
const sequencerEl = document.getElementById('sequencer');
const btnExport = document.getElementById('btn-export');

// --- AUDIO SYSTEM ---
let audioCtx, masterFilter, masterReverb, limiter, analyser;
let analyserData;
let droneOsc, droneFilter;

async function loadTone() {
    if (window.Tone) return Promise.resolve();
    return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js';
        script.onload = () => resolve();
        script.onerror = () => reject(new Error("Failed to load Tone.js"));
        document.head.appendChild(script);
    });
}

async function initAudio() {
    await Tone.start();
    audioCtx = Tone.getContext().rawContext;

    masterFilter = new Tone.Filter(MATERIALS[activeMaterial].filter, "lowpass");
    masterReverb = new Tone.Reverb({ decay: 2.5, wet: 0.3 });
    limiter = new Tone.Limiter(-3);
    analyser = new Tone.Analyser('waveform', 2048); // Increased resolution for denser lines

    masterFilter.chain(masterReverb, limiter, analyser, Tone.Destination);
    await masterReverb.ready;

    analyserData = analyser.getValue();

    // Ambient Drone
    droneOsc = new Tone.Noise("pink");
    droneFilter = new Tone.AutoFilter({ frequency: 0.1, baseFrequency: 50, octaves: 2, filter: { type: "lowpass", Q: 1 } }).start();
    const droneGain = new Tone.Gain(0.02);
    droneOsc.chain(droneFilter, droneGain, masterFilter);
    droneOsc.start();
}

function playStoneSound(index, timeOffset = 0) {
    const freq = STONE_FREQS[index];
    const mat = MATERIALS[activeMaterial];
    const t = Tone.now() + timeOffset;

    const detune = (Math.random() - 0.5) * 10;
    const f = freq * Math.pow(2, detune / 1200);

    mat.ratios.forEach((ratio, i) => {
        const osc = new Tone.Oscillator({
            frequency: f * ratio,
            type: "sine"
        });
        const env = new Tone.Gain(0);

        osc.connect(env);
        env.connect(masterFilter);

        osc.start(t);
        env.gain.setValueAtTime(0, t);
        env.gain.linearRampToValueAtTime(mat.amps[i], t + 0.005);
        env.gain.exponentialRampToValueAtTime(0.001, t + mat.decays[i]);
        osc.stop(t + mat.decays[i] + 0.1);

        // Clean up Tone nodes to prevent memory leaks over time
        setTimeout(() => {
            try { osc.dispose(); env.dispose(); } catch(e) {}
        }, (timeOffset + mat.decays[i] + 1) * 1000);
    });
}

// --- VISUAL SYSTEM ---
let width, height;
const cam = { x: 0, y: 12, z: -25, fov: 600 };
let timeOffset = 0;
let lastTime = 0;

const ripples = [];
const stones = [];

class Stone {
    constructor(index) {
        this.index = index;
        this.baseX = 0;
        this.baseZ = 0;
        this.y = 0;
        this.flash = 0;
        this.polyBase = [];
        this.polyTarget = [];
        
        const numPts = 5 + Math.floor(Math.random() * 3);
        for(let i=0; i<numPts; i++) {
            const angle = (i / numPts) * Math.PI * 2;
            const bRad = 1.2;
            const tRad = 0.8 + Math.random() * 1.0;
            this.polyBase.push({ a: angle, r: bRad });
            this.polyTarget.push({ a: angle + (Math.random()-0.5)*0.5, r: tRad });
        }
    }

    updatePos(w) {
        const isMobile = w < 768;
        if (isMobile) {
            const row = Math.floor(this.index / 5);
            const col = this.index % 5;
            this.baseX = (col - 2) * 5;
            this.baseZ = row === 0 ? 5 : 15;
        } else {
            this.baseX = (this.index - 4.5) * 5;
            this.baseZ = 10;
        }
    }

    hit() {
        this.flash = 1.0;
        ripples.push({
            x: this.baseX, z: this.baseZ, 
            time: 0, amp: 1.5, 
            speed: 12, freq: 2.0, falloff: 0.15
        });
    }

    draw(ctx, w, h, thm) {
        this.flash *= 0.92;
        
        // Morph shape
        const pts = [];
        for(let i=0; i<this.polyBase.length; i++) {
            const a = this.polyBase[i].a * (1-shapeFactor) + this.polyTarget[i].a * shapeFactor;
            const r = this.polyBase[i].r * (1-shapeFactor) + this.polyTarget[i].r * shapeFactor;
            pts.push({ x: this.baseX + Math.cos(a)*r, z: this.baseZ + Math.sin(a)*r });
        }

        const screenPts = pts.map(p => project(p.x, this.y, p.z, w, h));
        const center = project(this.baseX, this.y + 0.5, this.baseZ, w, h);

        ctx.beginPath();
        ctx.moveTo(screenPts[0].x, screenPts[0].y);
        for(let i=1; i<screenPts.length; i++) ctx.lineTo(screenPts[i].x, screenPts[i].y);
        ctx.closePath();

        const baseColor = hexToRgb(thm.accent);
        ctx.fillStyle = `rgba(${baseColor}, ${0.1 + this.flash * 0.6})`;
        ctx.fill();

        ctx.strokeStyle = thm.accent;
        ctx.lineWidth = 1 + this.flash * 2;
        ctx.shadowBlur = this.flash * 20;
        ctx.shadowColor = thm.accent;
        ctx.stroke();

        // Facets
        ctx.beginPath();
        for(let i=0; i<screenPts.length; i++) {
            ctx.moveTo(center.x, center.y);
            ctx.lineTo(screenPts[i].x, screenPts[i].y);
        }
        ctx.lineWidth = 0.5;
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Store click target
        this.screenX = center.x;
        this.screenY = center.y;
    }
}

function project(x, y, z, w, h) {
    const scale = cam.fov / (z - cam.z);
    return {
        x: (x - cam.x) * scale + w/2,
        y: (y - cam.y) * scale + h/2,
        scale: scale
    };
}

function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    cvs.width = width;
    cvs.height = height;
    stones.forEach(s => s.updatePos(width));
}

function hexToRgb(hex) {
    const bigint = parseInt(hex.slice(1), 16);
    return `${(bigint >> 16) & 255}, ${(bigint >> 8) & 255}, ${bigint & 255}`;
}

// Draw Loop
function draw(time) {
    requestAnimationFrame(draw);
    const dt = (time - lastTime) / 1000 || 0;
    lastTime = time;
    timeOffset += dt;

    const thm = THEMES[activeTheme];

    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = thm.bg;
    ctx.fillRect(0, 0, width, height);

    ctx.globalCompositeOperation = 'lighter';

    // Update ripples
    for(let i = ripples.length-1; i>=0; i--) {
        ripples[i].time += dt;
        if(ripples[i].time > 3.0) ripples.splice(i, 1);
    }

    // Analyser Waveform mapping
    let waveData = null;
    if (analyser) {
        analyserData = analyser.getValue();
        waveData = analyserData;
    }

    // --- DRAW DENSE DYNAMIC WAVEFORM ---
    if (waveData) {
        ctx.save();
        ctx.translate(0, height / 2);
        ctx.globalCompositeOperation = 'lighter';

        const numSamples = waveData.length;
        const step = width / numSamples;

        // Pass 1: The thick, lower-opacity background haze (Gritty texture)
        ctx.beginPath();
        for(let i=0; i<numSamples; i++) {
            let x = i * step;
            let val = waveData[i];
            
            // Map screen X to approximate world X for ripple interaction
            let worldX = (x / width - 0.5) * 30; 
            let rOffset = 0;
            for(let rip of ripples) {
                const d = Math.abs(worldX - rip.x); 
                const phase = d * rip.freq - rip.time * rip.speed;
                if (phase < 0) {
                    const ripAmp = rip.amp * Math.exp(-d * rip.falloff) * Math.max(0, 1 - rip.time/3);
                    rOffset += Math.sin(phase) * ripAmp * 0.08; // Subtler ripple impact
                }
            }

            let combinedVal = val + rOffset;
            
            // Subtler jitter for less dynamic chaos
            let jitter = 1.0 + (Math.random() - 0.5) * 0.15;
            let yAmp = Math.abs(combinedVal) * height * 0.12 * jitter; // Reduced height
            
            ctx.moveTo(x, -yAmp);
            ctx.lineTo(x, yAmp);
        }
        ctx.lineWidth = 1;
        ctx.strokeStyle = `rgba(${hexToRgb(thm.sec)}, 0.03)`; // Extremely transparent secondary color
        ctx.stroke();

        // Pass 2: The sharper, brighter core peaks (Accent color)
        ctx.beginPath();
        for(let i=0; i<numSamples; i += 3) { // Skip samples for a "spiky" structured look
            let x = i * step;
            let val = waveData[i];
            
            let worldX = (x / width - 0.5) * 30; 
            let rOffset = 0;
            for(let rip of ripples) {
                const d = Math.abs(worldX - rip.x); 
                const phase = d * rip.freq - rip.time * rip.speed;
                if (phase < 0) {
                    const ripAmp = rip.amp * Math.exp(-d * rip.falloff) * Math.max(0, 1 - rip.time/3);
                    rOffset += Math.sin(phase) * ripAmp * 0.08; // Subtler ripple impact
                }
            }

            let combinedVal = val + rOffset;
            // Less random multiplier for a calmer peak structure
            let yAmp = Math.abs(combinedVal) * height * 0.08 * (0.9 + Math.random() * 0.2); 
            
            if (yAmp > 1) { // Only draw significant peaks
                ctx.moveTo(x, -yAmp);
                ctx.lineTo(x, yAmp);
            }
        }
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = `rgba(${hexToRgb(thm.accent)}, 0.08)`; // Fainter accent color glow
        ctx.stroke();

        // Pass 3: The solid center origin line
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(width, 0);
        ctx.lineWidth = 1;
        ctx.strokeStyle = `rgba(${hexToRgb(thm.sec)}, 0.15)`; // Fainter center line
        ctx.stroke();

        ctx.restore();
    }

    // Darken center behind the massive number to prioritize legibility
    const centerGrad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, height*0.35);
    centerGrad.addColorStop(0, `rgba(${hexToRgb(thm.bg)}, 0.85)`);
    centerGrad.addColorStop(1, `rgba(${hexToRgb(thm.bg)}, 0)`);
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = centerGrad;
    ctx.fillRect(0, 0, width, height);

    // Draw Stones
    stones.forEach(s => s.draw(ctx, width, height, thm));
}

// --- LOGIC & PLAYBACK ---

function updateNumberDisplay(num) {
    numEl.innerText = num;
    numEl.classList.remove('pop');
    void numEl.offsetWidth; // trigger reflow
    numEl.classList.add('pop');
}

async function startAutoCountdown() {
    currentState = STATES.AUTO;
    btnBegin.parentElement.style.display = 'none';
    
    let count = 10;
    
    // Recursive loop for perfect 1s timing
    function playNext() {
        if (count > 0) {
            const stoneIdx = AUTO_SEQUENCE[10 - count];
            stones[stoneIdx].hit();
            playStoneSound(stoneIdx);
            updateNumberDisplay(count);
            count--;
            setTimeout(playNext, 1000);
        } else {
            setTimeout(enterComposeMode, 1500);
        }
    }
    
    updateNumberDisplay(10);
    playNext();
}

function enterComposeMode() {
    currentState = STATES.COMPOSE;
    bottomBar.classList.add('visible');
    customPanel.classList.add('visible');
    buildSequencerUI();
    selectSlot(0); // Select first slot (10)
}

function buildSequencerUI() {
    sequencerEl.innerHTML = '';
    for(let i=0; i<10; i++) {
        const d = document.createElement('div');
        d.className = 'seq-slot';
        d.setAttribute('data-num', 10 - i);
        d.onclick = () => selectSlot(i);
        sequencerEl.appendChild(d);
    }
}

function selectSlot(idx) {
    selectedSlot = idx;
    const slots = document.querySelectorAll('.seq-slot');
    slots.forEach((s, i) => s.classList.toggle('active', i === idx));
}

async function playSequenceLive() {
    if(isPlayingSequence) return;
    isPlayingSequence = true;
    
    const slots = document.querySelectorAll('.seq-slot');
    let step = 0;

    function playStep() {
        if(step >= 10) {
            isPlayingSequence = false;
            return;
        }

        slots.forEach(s => s.classList.remove('playing'));
        slots[step].classList.add('playing');
        
        const stoneIdx = sequence[step];
        if (stoneIdx !== null) {
            stones[stoneIdx].hit();
            playStoneSound(stoneIdx);
        }
        
        updateNumberDisplay(10 - step);
        step++;
        setTimeout(playStep, 1000);
    }
    
    playStep();
}

// --- EXPORT WAV (OFFLINE RENDERING) ---
async function recordAndExport() {
    if(isRecording || isPlayingSequence) return;
    isRecording = true;
    btnExport.style.display = 'none';
    
    // Play live visually while rendering in background
    playSequenceLive();

    const duration = 11.5; // 10s sequence + 1.5s tail
    const sampleRate = 44100;
    const offCtx = new OfflineAudioContext(2, sampleRate * duration, sampleRate);
    
    // Setup matching offline fx chain
    const offFilter = offCtx.createBiquadFilter();
    offFilter.type = "lowpass";
    offFilter.frequency.value = MATERIALS[activeMaterial].filter;

    // Use a simple convolver for offline reverb to guarantee rendering
    const offReverb = offCtx.createConvolver();
    offReverb.buffer = await generateImpulseResponse(offCtx, 2.5);

    // Wet/Dry mix for offline reverb
    const dryNode = offCtx.createGain(); dryNode.gain.value = 0.7;
    const wetNode = offCtx.createGain(); wetNode.gain.value = 0.3;

    offFilter.connect(dryNode);
    offFilter.connect(offReverb);
    offReverb.connect(wetNode);

    dryNode.connect(offCtx.destination);
    wetNode.connect(offCtx.destination);

    // Schedule sequence
    for(let i=0; i<10; i++) {
        if(sequence[i] !== null) {
            // Re-use tone voice logic but with offline context
            const freq = STONE_FREQS[sequence[i]];
            const mat = MATERIALS[activeMaterial];
            const t = i * 1.0;
            const f = freq * Math.pow(2, ((Math.random() - 0.5) * 10) / 1200);

            mat.ratios.forEach((ratio, j) => {
                const osc = offCtx.createOscillator();
                osc.type = "sine";
                osc.frequency.value = f * ratio;

                const gain = offCtx.createGain();
                gain.gain.value = 0;

                osc.connect(gain);
                gain.connect(offFilter);

                osc.start(t);
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(mat.amps[j], t + 0.005);
                gain.gain.exponentialRampToValueAtTime(0.001, t + mat.decays[j]);
                osc.stop(t + mat.decays[j] + 0.1);
            });
        }
    }

    const renderedBuffer = await offCtx.startRendering();
    const wavBlob = audioBufferToWav(renderedBuffer);
    const url = URL.createObjectURL(wavBlob);
    
    btnExport.onclick = () => {
        const a = document.createElement('a');
        a.href = url;
        a.download = 'my-io-countdown.wav';
        a.click();
    };

    // Wait until live playback finishes before showing button
    setTimeout(() => {
        isRecording = false;
        btnExport.style.display = 'block';
    }, 10000);
}

// Generate basic synthetic IR for offline context
async function generateImpulseResponse(ctx, duration) {
    const length = ctx.sampleRate * duration;
    const impulse = ctx.createBuffer(2, length, ctx.sampleRate);
    for (let i = 0; i < 2; i++) {
        const channel = impulse.getChannelData(i);
        for (let j = 0; j < length; j++) {
            channel[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / length, 3);
        }
    }
    return impulse;
}

// WAV Encoder
function audioBufferToWav(buffer) {
    const numOfChan = buffer.numberOfChannels;
    const length = buffer.length * numOfChan * 2 + 44;
    const bufferData = new ArrayBuffer(length);
    const view = new DataView(bufferData);
    const channels = [];
    let pos = 0, offset = 0;

    const setUint16 = data => { view.setUint16(pos, data, true); pos += 2; };
    const setUint32 = data => { view.setUint32(pos, data, true); pos += 4; };

    setUint32(0x46464952); // "RIFF"
    setUint32(length - 8); // file length - 8
    setUint32(0x45564157); // "WAVE"
    setUint32(0x20746d66); // "fmt " chunk
    setUint32(16); // length = 16
    setUint16(1); // PCM
    setUint16(numOfChan);
    setUint32(buffer.sampleRate);
    setUint32(buffer.sampleRate * 2 * numOfChan); // avg. bytes/sec
    setUint16(numOfChan * 2); // block-align
    setUint16(16); // 16-bit
    setUint32(0x61746164); // "data" - chunk
    setUint32(length - pos - 4); // chunk length

    for(let i=0; i<buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));

    while(pos < length) {
        for(let i=0; i<numOfChan; i++) {
            let sample = Math.max(-1, Math.min(1, channels[i][offset]));
            sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
            view.setInt16(pos, sample, true);
            pos += 2;
        }
        offset++;
    }
    return new Blob([bufferData], {type: "audio/wav"});
}

// --- EVENTS ---

btnBegin.addEventListener('click', async () => {
    btnBegin.innerText = "LOADING...";
    try {
        await loadTone();
        await initAudio();
        startAutoCountdown();
    } catch(err) {
        console.error(err);
        btnBegin.innerText = "BEGIN";
    }
});

document.getElementById('btn-play').addEventListener('click', playSequenceLive);
document.getElementById('btn-record').addEventListener('click', recordAndExport);
document.getElementById('btn-reset').addEventListener('click', () => {
    sequence.fill(null);
    document.querySelectorAll('.seq-slot').forEach(s => {
        s.classList.remove('filled');
        s.innerText = '';
    });
    btnExport.style.display = 'none';
});

// Stone clicks
cvs.addEventListener('pointerdown', (e) => {
    if (currentState === STATES.IDLE) return;
    
    const rect = cvs.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    let hitIdx = -1;
    let minDist = 40;

    stones.forEach((s, i) => {
        const dist = Math.hypot(mx - s.screenX, my - s.screenY);
        if(dist < minDist) { minDist = dist; hitIdx = i; }
    });

    if (hitIdx !== -1) {
        stones[hitIdx].hit();
        playStoneSound(hitIdx);

        if (currentState === STATES.COMPOSE && selectedSlot !== null && !isPlayingSequence) {
            sequence[selectedSlot] = hitIdx;
            const slotEl = document.querySelectorAll('.seq-slot')[selectedSlot];
            slotEl.classList.add('filled');
            slotEl.innerText = hitIdx;
            
            // Auto advance
            if (selectedSlot < 9) selectSlot(selectedSlot + 1);
        }
    }
});

// Customization listeners
document.getElementById('mat-toggles').addEventListener('click', (e) => {
    if(e.target.classList.contains('toggle-btn')) {
        document.querySelectorAll('#mat-toggles .toggle-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        activeMaterial = parseInt(e.target.getAttribute('data-val'));
        if (masterFilter) masterFilter.frequency.rampTo(MATERIALS[activeMaterial].filter, 0.5);
    }
});

document.getElementById('scene-toggles').addEventListener('click', (e) => {
    if(e.target.classList.contains('toggle-btn')) {
        document.querySelectorAll('#scene-toggles .toggle-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        activeTheme = parseInt(e.target.getAttribute('data-val'));
        
        const root = document.documentElement;
        const thm = THEMES[activeTheme];
        root.style.setProperty('--bg', thm.bg);
        root.style.setProperty('--accent', thm.accent);
        root.style.setProperty('--secondary', thm.sec);
        
        const rgb = hexToRgb(thm.accent);
        root.style.setProperty('--accent-glow', `rgba(${rgb}, 0.4)`);
    }
});

document.getElementById('slider-shape').addEventListener('input', (e) => {
    shapeFactor = parseFloat(e.target.value);
});

window.addEventListener('resize', resize);

// Init
window.onload = () => {
    for(let i=0; i<10; i++) stones.push(new Stone(i));
    resize();
    requestAnimationFrame(draw);
};
